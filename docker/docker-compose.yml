version: "3.9"

services:
  voxelforge-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: voxelforge-api:latest
    container_name: voxelforge_api
    ports:
      - "8080:8080"
    volumes:
      # Mount a host directory to persist generated assets
      - ./output:/app/generated_assets
    environment:
      VOXELFORGE_ASSETS_DIR: /app/generated_assets
      # Optional: set your OpenAI key here for the agent endpoint
      # OPENAI_API_KEY: sk-...
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
